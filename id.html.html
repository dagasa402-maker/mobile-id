<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>정부24 모바일신분증</title>
    <style>
        :root {
            --bg-gray: #f2f3f7;
            --text-black: #1a1a1a;
            --primary-blue: #4a7aff;
            --progress-grad: linear-gradient(90deg, #6b9fff, #5d3eff);
        }

        body { 
            background-color: var(--bg-gray); margin: 0; 
            font-family: 'Pretendard', -apple-system, sans-serif; 
            color: var(--text-black); overflow-x: hidden;
            touch-action: manipulation; -webkit-tap-highlight-color: transparent;
        }

        /* [1] 정보 설정 페이지 */
        .config-page {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 1000; display: none; overflow-y: auto;
            padding: 20px; box-sizing: border-box;
        }
        .config-page.active { display: block; }
        .config-header { font-size: 14px; text-align: left; color: #333; margin-bottom: 20px; line-height: 1.6; }
        .config-header b { display: block; font-size: 18px; margin-bottom: 5px; color: #000; }
        
        .input-group { display: flex; flex-direction: column; margin-bottom: 15px; }
        .label-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 5px; }
        .input-group label { font-size: 14px; color: #333; font-weight: 600; }
        .input-group label span { display: block; font-size: 12px; color: #666; font-weight: normal; margin-top: 2px; }
        
        .input-group input { 
            width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; 
            font-size: 16px; outline: none; box-sizing: border-box;
        }

        .config-footer { display: flex; gap: 10px; margin-top: 30px; padding-bottom: 40px; }
        .btn-close { flex: 1; padding: 15px; background: #4a7aff; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .btn-save { flex: 2; padding: 15px; background: #3366ff; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }

        /* [2] 메인 UI */
        .header-container { background: white; border-bottom: 1px solid #e5e5e5; }
        .top-nav { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .nav-title { font-size: 18px; font-weight: 600; flex-grow: 1; text-align: center; margin-left: 30px; }
        .menu-btn { cursor: pointer; font-size: 24px; color: #888; border: none; background: none; }
        .tab-menu { display: flex; padding: 0 20px; gap: 25px; }
        .tab { padding: 10px 0 12px; font-size: 16px; font-weight: 600; color: #aaa; cursor: pointer; position: relative; }
        .tab.active { color: var(--text-black); }
        .tab.active::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 3px; background: var(--text-black); }

        .container { padding: 20px; display: flex; justify-content: center; }
        .id-card {
            width: 100%; max-width: 340px; background: white; border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow: hidden; display: flex; flex-direction: column; min-height: 520px;
        }
        #display-photo { width: 155px; height: 195px; margin: 30px auto 20px; border-radius: 5px; display: block; object-fit: cover; background: #f0f0f0; }

        .info-section { padding: 0 25px 20px; position: relative; }
        .name { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 10px; display: block; }
        
        .birth-row { font-size: 16px; font-weight: 600; color: #333; margin-bottom: 4px; }
        .addr-text { font-size: 15px; color: #333; font-weight: 500; line-height: 1.4; }
        .masked-text { color: #bbb; letter-spacing: -1px; }

        /* 모드별 표시 제어 */
        .qr-only { display: block; }
        .detail-only { display: none; }
        .is-detail .qr-only { display: none; }
        .is-detail .detail-only { display: block; }

        .qr-addr1 { font-size: 14px; color: #666; font-weight: 500; margin-top: -2px; }

        .upper-right { position: absolute; right: 25px; top: 0; width: 110px; height: 110px; display: flex; align-items: center; justify-content: center; }
        .qr-box img { width: 110px; height: 110px; }

        .toggle-switch { position: relative; display: inline-block; width: 66px; height: 34px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 26px; width: 26px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--primary-blue); }
        input:checked + .slider:before { transform: translateX(32px); }

        .issue-date { font-size: 15px; color: #333; margin-top: 20px; font-weight: 500; }
        .authority { font-size: 15px; font-weight: 500; color: #888; margin-top: 4px; letter-spacing: -0.3px; }

        .timer-section { padding: 0 25px 15px; margin-top: auto; }
        .progress-container { height: 6px; background: #eee; border-radius: 10px; margin-bottom: 8px; overflow: hidden; }
        .progress-fill { height: 100%; width: 100%; background: var(--progress-grad); transition: width 1s linear; }
        .timer-info { font-size: 13px; color: #999; }
        .timer-info span { color: var(--primary-blue); font-weight: bold; }
        .btn-detail { width: 100%; padding: 22px; background: #171717; color: white; border: none; font-size: 16px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="config-page" id="configPage">
        <div class="config-header"><b>정보 설정</b>만든 색히 - ㅇㅇㅎ</div>
        
        <div class="input-group"><label>이름</label><input type="text" id="in-name" value="전두환"></div>
        
        <div class="input-group">
            <div class="label-row"><label>발급일자</label><span>(숫자만)</span></div>
            <input type="text" id="in-date" value="20240520">
        </div>

        <div class="input-group">
            <div class="label-row"><label>주민번호 앞자리</label><span>(숫자만)</span></div>
            <input type="text" id="in-birth" value="070307">
        </div>

        <div class="input-group">
            <div class="label-row"><label>주민번호 뒷자리</label><span>(숫자만)</span></div>
            <input type="text" id="in-back" value="6975523">
        </div>

        <div class="input-group">
            <div class="label-row"><label>주소1</label><span>(지명)</span></div>
            <input type="text" id="in-addr1" value="경기도 시흥시">
        </div>
        <div class="input-group">
            <div class="label-row"><label>주소2</label><span>(도로명)</span></div>
            <input type="text" id="in-addr2" value="목감동">
        </div>
        <div class="input-group">
            <div class="label-row"><label>주소3</label><span>(상세주소)</span></div>
            <input type="text" id="in-addr3" value="123-45">
        </div>

        <div class="input-group"><label>인증자</label><input type="text" id="in-auth" value="시흥시장"></div>
        
        <div class="input-group"><label>사진</label><input type="file" id="in-file" accept="image/*"></div>

        <div class="config-footer">
            <button class="btn-close" onclick="closeConfig()">닫기</button>
            <button class="btn-save" onclick="saveConfig()">기기에 정보 저장</button>
        </div>
    </div>

    <div class="header-container">
        <div class="top-nav"><span>〈</span><div class="nav-title">모바일신분증</div><button class="menu-btn" onclick="openConfig()">≡</button></div>
        <div class="tab-menu"><div class="tab active">주민등록증</div><div class="tab">운전면허증</div></div>
    </div>

    <div class="container">
        <div class="id-card" id="idCard">
            <img id="display-photo" src="" alt="사진">
            <div class="info-section">
                <span class="name" id="display-name">전두환</span>
                
                <div class="qr-only">
                    <div class="birth-row" id="display-qr-birth">07.03.07</div>
                    <div class="qr-addr1" id="display-qr-addr1">경기도 시흥시</div>
                </div>

                <div class="detail-only">
                    <div class="birth-row">
                        <span id="display-birth-text">070307</span>-<span id="display-gender">6</span><span id="display-back-masked" class="masked-text">******</span><span id="display-back-real" style="display:none;">975523</span>
                    </div>
                    <div class="addr-text">
                        <span id="display-addr-masked" class="masked-text">.........</span><span id="display-addr-real" style="display:none;">경기도 시흥시 목감동 123-45</span>
                    </div>
                    <div class="issue-date" id="display-date">2024.05.20</div>
                    <div class="authority" id="display-auth">시흥시장</div>
                </div>

                <div class="upper-right">
                    <div class="qr-only qr-box"><img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=GOV" alt="QR"></div>
                    <div class="detail-only">
                        <label class="toggle-switch"><input type="checkbox" id="infoSwitch"><span class="slider"></span></label>
                    </div>
                </div>
            </div>

            <div class="timer-section">
                <div class="progress-container"><div class="progress-fill" id="bar"></div></div>
                <div class="timer-info">남은시간 <span id="time">30초</span></div>
            </div>
            <button class="btn-detail" id="toggleBtn">상세정보 표시</button>
        </div>
    </div>

    <script>
        const configPage = document.getElementById('configPage');
        const idCard = document.getElementById('idCard');
        const toggleBtn = document.getElementById('toggleBtn');
        const infoSwitch = document.getElementById('infoSwitch');

        toggleBtn.addEventListener('click', () => {
            idCard.classList.toggle('is-detail');
            toggleBtn.innerText = idCard.classList.contains('is-detail') ? "QR정보 표시" : "상세정보 표시";
            infoSwitch.checked = false;
            updateInfoVisibility(false);
        });

        infoSwitch.addEventListener('change', (e) => updateInfoVisibility(e.target.checked));

        function updateInfoVisibility(show) {
            document.getElementById('display-back-masked').style.display = show ? 'none' : 'inline';
            document.getElementById('display-back-real').style.display = show ? 'inline' : 'none';
            document.getElementById('display-addr-masked').style.display = show ? 'none' : 'inline';
            document.getElementById('display-addr-real').style.display = show ? 'inline' : 'none';
        }

        function openConfig() { configPage.classList.add('active'); }
        function closeConfig() { configPage.classList.remove('active'); }

        function saveConfig() {
            const birth = document.getElementById('in-birth').value;
            const backVal = document.getElementById('in-back').value;
            const dateVal = document.getElementById('in-date').value;
            const addr1 = document.getElementById('in-addr1').value;
            const addr2 = document.getElementById('in-addr2').value;
            const addr3 = document.getElementById('in-addr3').value;
            
            document.getElementById('display-name').innerText = document.getElementById('in-name').value;
            
            if(birth.length === 6) {
                document.getElementById('display-qr-birth').innerText = `${birth.substring(0,2)}.${birth.substring(2,4)}.${birth.substring(4,6)}`;
            }
            document.getElementById('display-qr-addr1').innerText = addr1;
            
            document.getElementById('display-birth-text').innerText = birth;
            document.getElementById('display-gender').innerText = backVal[0];
            document.getElementById('display-back-real').innerText = backVal.substring(1);
            
            const fullAddr = `${addr1} ${addr2} ${addr3}`;
            document.getElementById('display-addr-real').innerText = fullAddr;
            
            if(dateVal.length === 8) {
                document.getElementById('display-date').innerText = `${dateVal.substring(0,4)}.${dateVal.substring(4,6)}.${dateVal.substring(6,8)}`;
            } else {
                document.getElementById('display-date').innerText = dateVal;
            }

            document.getElementById('display-auth').innerText = document.getElementById('in-auth').value;

            const fileInput = document.getElementById('in-file');
            if (fileInput.files && fileInput.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => { document.getElementById('display-photo').src = e.target.result; };
                reader.readAsDataURL(fileInput.files[0]);
            }
            closeConfig();
        }

        let count = 30;
        setInterval(() => { 
            count--; if (count < 0) count = 30; 
            document.getElementById('time').innerText = count + "초";
            document.getElementById('bar').style.width = (count / 30 * 100) + "%";
        }, 1000);
    </script>
</body>
</html>
